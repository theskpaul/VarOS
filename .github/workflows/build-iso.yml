---
# ──────────────────────────────────────────────────────────────────────────────
# build-iso.yml
# Builds a bootable Anaconda installer ISO from the published VarOS container
# image using bootc-image-builder (BIB). The ISO uses the kickstart config in
# disk_config/iso.toml so the installer knows how to switch to the GHCR image
# post-install.
#
# Triggers:
#   • workflow_dispatch  — run manually from the GitHub Actions UI
#   • push to main       — only when iso.toml or this workflow file changes
#   • pull_request       — same path filter, so PRs that touch the ISO config
#                          are validated before merge
# ──────────────────────────────────────────────────────────────────────────────

name: Build Installer ISO

on:
  workflow_dispatch:
    inputs:
      upload-to-s3:
        description: 'Upload finished ISO to S3 instead of GitHub Artifacts'
        required: false
        default: false
        type: boolean

  push:
    branches:
      - main
    paths:
      - 'disk_config/iso.toml'
      - '.github/workflows/build-iso.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'disk_config/iso.toml'
      - '.github/workflows/build-iso.yml'

# Suppress Node 16 deprecation warnings from older third-party actions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ${{ github.event.repository.name }}
  IMAGE_REGISTRY: 'ghcr.io/${{ github.repository_owner }}'
  DEFAULT_TAG: 'latest'
  # Using the official Quay image. The lorbuschris mirror tag 20250608
  # does not exist — switching back to the upstream source.
  BIB_IMAGE: 'quay.io/centos-bootc/bootc-image-builder:latest'

# Cancel any in-progress run for the same branch/PR when a new one is pushed.
# This saves runner minutes and avoids uploading stale artifacts.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build Anaconda Installer ISO
    runs-on: ubuntu-24.04

    permissions:
      contents: read # checkout
      packages: read # pull the published container image from GHCR
      id-token: write # needed if you later add Cosign signing

    steps:
      # ────────────────────────────────────────────────────────────────────────
      # 1. ENVIRONMENT PREP
      # Lowercase the image name and registry so GHCR does not reject the pull.
      # GHCR treats uppercase letters in image references as an error, but
      # GitHub repo names are case-preserving, so we must normalize here.
      # ────────────────────────────────────────────────────────────────────────
      - name: Prepare environment
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}"         >> "$GITHUB_ENV"
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> "$GITHUB_ENV"

      # ────────────────────────────────────────────────────────────────────────
      # 2. FREE DISK SPACE
      # GitHub's ubuntu-24.04 runners start with ~25 GB free. A bootc ISO build
      # easily consumes 15–20 GB (the pulled container layers + BIB workspace +
      # the finished ISO itself). Removing Android SDK, Haskell GHC, and .NET
      # runtimes recovers ~15 GB, which makes the build reliably non-OOM.
      # ────────────────────────────────────────────────────────────────────────
      - name: Free disk space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v9
        with:
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-codeql: true

      - name: Show available disk space
        run: df -h

      # ────────────────────────────────────────────────────────────────────────
      # 3. BTRFS CONTAINER STORAGE
      # By default the runner uses overlayfs on a thin ext4 partition for
      # container storage. Large images with many layers cause I/O errors or
      # silent corruption under that setup. Creating a dedicated BTRFS image
      # file and mounting it at /var/lib/containers gives Podman a proper
      # copy-on-write filesystem with transparent zstd compression — the same
      # filesystem the image was built on — which is both faster and safer.
      # ────────────────────────────────────────────────────────────────────────
      - name: Set up BTRFS container storage
        run: |
          # Allocate a 70 GB sparse file. "truncate" is instant because it only
          # reserves address space; blocks are allocated on write.
          sudo truncate -s 70G /mnt/podman-storage.img
          sudo mkfs.btrfs -f /mnt/podman-storage.img

          # Reset Podman so it does not hold any lock on the old storage path.
          sudo podman system reset --force
          sudo systemctl stop podman.service

          # Mount with compress-force=zstd:2. Level 2 is cheap CPU-wise and
          # cuts the on-disk footprint of RPM content by ~40%.
          sudo mount \
            -o compress-force=zstd:2 \
            /mnt/podman-storage.img \
            /var/lib/containers/storage

          sudo systemctl start podman.service

      # ────────────────────────────────────────────────────────────────────────
      # 4. CHECKOUT
      # We need disk_config/iso.toml from the repo. That's the only project
      # file BIB consumes at runtime; everything else (packages, systemd units)
      # is already baked into the container image we pull from GHCR.
      # ────────────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ────────────────────────────────────────────────────────────────────────
      # 5. AUTHENTICATE TO GHCR
      # BIB (which runs as a privileged Podman container internally) needs to
      # pull the VarOS image from GHCR. We log in with the ephemeral
      # GITHUB_TOKEN, which has read:packages permission from the job's
      # permissions block above.
      # ────────────────────────────────────────────────────────────────────────
      - name: Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo podman login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      # Pull the VarOS image explicitly with retries before handing off to BIB.
      # BIB no longer pulls images itself — it requires the image to already be
      # in local container storage. We also retry up to 3 times to survive
      # transient GHCR 502 errors like the one that caused this failure.
      - name: Capture runner UID and GID
        run: |
          echo "USER_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "USER_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Pull VarOS image
        run: |
          for i in 1 2 3; do
            echo "Pull attempt $i..."
            sudo podman pull \
              ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }} && break
            echo "Attempt $i failed. Waiting 20s before retry..."
            sleep 20
          done

      # ────────────────────────────────────────────────────────────────────────
      # 6. BUILD THE ISO WITH BOOTC-IMAGE-BUILDER
      # BIB is the official tool from the osbuild project for converting a
      # bootc container image into bootable disk images or installers.
      # The "anaconda-iso" type produces an Anaconda-based interactive or
      # kickstart installer, which is what disk_config/iso.toml configures.
      #
      # The osbuild/bootc-image-builder-action wraps the BIB container so we
      # don't have to manage the privileged Podman invocation ourselves.
      #
      # Key flags passed through the action:
      #   builder-image  — the exact BIB OCI reference (pinned above)
      #   image          — the VarOS image to embed in the installer
      #   config-file    — our iso.toml with the kickstart post-install script
      #   types          — "anaconda-iso" (as opposed to qcow2 or raw)
      #   additional-args — --use-librepo=True speeds up RPM fetching inside
      #                     BIB by using librepo's parallel downloader
      # ────────────────────────────────────────────────────────────────────────
      - name: Build ISO
        id: build
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}
          config-file: ./disk_config/iso.toml
          types: anaconda-iso
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}
          # --rootfs=btrfs matches what your Justfile and disk.toml already declare.
          # Without it, BIB cannot infer the filesystem type from the container and aborts.
          additional-args: --use-librepo=True --rootfs=btrfs

      # ────────────────────────────────────────────────────────────────────────
      # 7. COLLECT ARTIFACTS AND GENERATE CHECKSUM
      # BIB writes its output to a directory exposed via the action's
      # `output-directory` output variable. We move everything into a clean
      # `upload/` directory and generate a SHA-256 manifest alongside the ISO
      # so consumers can verify integrity without a separate signing step.
      #
      # On pull_request events we still run the build (to catch config errors)
      # but skip the upload — there's no point retaining PR artifacts.
      # ────────────────────────────────────────────────────────────────────────
      - name: Collect artifacts and generate checksum
        if: github.event_name != 'pull_request'
        id: prep
        shell: bash
        run: |
          mkdir -p upload
          cp -r "${{ steps.build.outputs.output-directory }}"/* upload/
          cd upload
          sha256sum $(find . -name "*.iso") > SHA256SUMS
          cat SHA256SUMS
          echo "upload_dir=$(pwd)" >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────────────────────────────
      # 8a. UPLOAD TO GITHUB ARTIFACTS (default path)
      # Stores the ISO as a workflow artifact for 7 days. Anyone with repo
      # access can download it from the Actions run page.
      #
      # compression-level: 0 — ISOs are already compressed internally
      #   (the Anaconda payload uses squashfs). Re-compressing them wastes
      #   several minutes and produces essentially zero size savings.
      # ────────────────────────────────────────────────────────────────────────
      - name: Upload ISO to GitHub Artifacts
        if: |
          github.event_name != 'pull_request' &&
          inputs.upload-to-s3 != true
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-installer-iso
          path: ${{ steps.prep.outputs.upload_dir }}
          compression-level: 0
          retention-days: 7
          if-no-files-found: error

      # ────────────────────────────────────────────────────────────────────────
      # 8b. UPLOAD TO S3 (optional, triggered by workflow_dispatch input)
      # When upload-to-s3 is true, rclone copies the ISO (and checksum) to the
      # S3-compatible bucket configured in your repository secrets. This is
      # useful for publishing releases or hosting ISOs at a stable URL.
      #
      # Required secrets:
      #   S3_PROVIDER, S3_ACCESS_KEY_ID, S3_SECRET_ACCESS_KEY,
      #   S3_REGION, S3_ENDPOINT, S3_BUCKET_NAME
      # ────────────────────────────────────────────────────────────────────────
      - name: Upload ISO to S3
        if: |
          github.event_name != 'pull_request' &&
          inputs.upload-to-s3 == true
        shell: bash
        env:
          RCLONE_CONFIG_S3_TYPE: s3
          RCLONE_CONFIG_S3_PROVIDER: ${{ secrets.S3_PROVIDER }}
          RCLONE_CONFIG_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          RCLONE_CONFIG_S3_REGION: ${{ secrets.S3_REGION }}
          RCLONE_CONFIG_S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          SOURCE_DIR: ${{ steps.prep.outputs.upload_dir }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y rclone
          rclone copy "$SOURCE_DIR" "S3:${{ secrets.S3_BUCKET_NAME }}"
