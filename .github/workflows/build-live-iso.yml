name: Build Live ISO

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-live-iso.yml'
      - 'installer/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # fix: added; suppresses Node 16 deprecation warnings

  IMAGE_NAME: "${{ github.event.repository.name }}"  # fix: was hardcoded to 'varos'
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"  # fix: was hardcoded to 'ghcr.io/${{ github.repository_owner }}'

# fix: added concurrency block — build.yml and build-disk.yml both have one; without
# it, two pushes in quick succession queue two ISO builds and waste runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-live-iso:
    name: Build Live ISO
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: read

    steps:
      # -------------------------------------------------
      # Show initial disk space
      # -------------------------------------------------
      - name: Show disk space before cleanup
        run: df -h

      # -------------------------------------------------
      # Free GitHub runner space
      # -------------------------------------------------
      - name: Remove unnecessary software
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v9
        # fix: was @v1 (floating tag); pinned to the same SHA used in build.yml for consistency
        with:
          remove-dotnet: true
          remove-android: true
          remove-haskell: true

      # -------------------------------------------------
      # Show free space after cleanup
      # -------------------------------------------------
      - name: Show disk space after cleanup
        run: df -h

      # -------------------------------------------------
      # Checkout repository
      # -------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Lowercase image registry
      # GHCR hates uppercase names
      # -------------------------------------------------
      - name: Prepare environment
        shell: bash
        run: |
          # fix: derive IMAGE_NAME and IMAGE_REGISTRY from env vars instead of hardcoding
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      # -------------------------------------------------
      # Create dedicated BTRFS container storage
      # Much more reliable for large ISO builds
      # -------------------------------------------------
      - name: Setup BTRFS container storage
        run: |
          sudo truncate -s 70G /mnt/podman-storage.img

          sudo mkfs.btrfs -f /mnt/podman-storage.img

          sudo podman system reset --force

          sudo systemctl stop podman.service

          sudo mount \
            -o compress-force=zstd:2 \
            /mnt/podman-storage.img \
            /var/lib/containers/storage

          sudo systemctl start podman.service

      # -------------------------------------------------
      # Build installer payload container
      # -------------------------------------------------
      - name: Build installer payload
        run: |
          sudo podman build \
            --cap-add sys_admin \
            --security-opt label=disable \
            --build-arg BASE_IMAGE=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -t localhost/${{ env.IMAGE_NAME }}-installer:latest \
            installer/
          # fix: was hardcoded to 'varos-installer'; now uses IMAGE_NAME env var

      # -------------------------------------------------
      # Build ISO using Titanoboa
      # -------------------------------------------------
      - name: Build ISO
        uses: Zeglius/titanoboa@b3b3c2f  # fix: was @revamp-pr (a branch name); pinned to a SHA
        # NOTE: replace b3b3c2f with the actual latest SHA from github.com/Zeglius/titanoboa
        id: build
        with:
          image-ref: localhost/${{ env.IMAGE_NAME }}-installer:latest
          # fix: was hardcoded to 'varos-installer'; now uses IMAGE_NAME env var
          iso-dest: ${{ env.IMAGE_NAME }}-live-amd64.iso
          # fix: was hardcoded to 'varos-live-amd64.iso'; now uses IMAGE_NAME env var

      # -------------------------------------------------
      # Prepare upload directory
      # -------------------------------------------------
      - name: Prepare artifacts
        id: prep
        shell: bash
        run: |
          mkdir -p upload

          ISO_PATH=${{ steps.build.outputs.iso-dest }}

          mv "$ISO_PATH" upload/

          cd upload

          sha256sum *.iso > SHA256SUMS

          echo "upload_dir=$(pwd)" >> $GITHUB_OUTPUT

      # -------------------------------------------------
      # Upload ISO artifact
      # -------------------------------------------------
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-live-iso
          # fix: was hardcoded to 'varos-live-iso'; now uses IMAGE_NAME env var
          path: ${{ steps.prep.outputs.upload_dir }}
          compression-level: 0
