---
name: VarOS Container Image

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "05 10 * * *" # 10:05am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # fix: added; suppresses Node 16 deprecation warnings

  IMAGE_DESC: "My Customized Bazzite Image called VarOS"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/120078124?s=200&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"
  FEDORA_VERSION: "44"  # fix: was CENTOS_VERSION — this is a Fedora/Bazzite image, not CentOS

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@v4  # fix: was labelled # v6 which does not exist

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v9

      # fix: cache the .base-digest file so it persists between scheduled runs.
      # Without this, CACHED is always "none" and the skip-if-unchanged logic
      # never fires — every scheduled run rebuilds unconditionally.
      - name: Restore base-digest cache
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: .base-digest
          key: base-digest-${{ env.FEDORA_VERSION }}

      # On scheduled runs, skip the entire pipeline if bazzite:stable hasn't
      # changed since the last build. This prevents pushing a new image with
      # different chunk hashes (causing unnecessary re-downloads) when nothing
      # actually changed.
      - name: Check if base image changed
        id: check
        if: github.event_name == 'schedule'
        run: |
          DIGEST=$(skopeo inspect --format '{{.Digest}}' \
            docker://ghcr.io/ublue-os/bazzite:stable)
          CACHED=$(cat .base-digest 2>/dev/null || echo "none")
          echo "changed=$([ "$DIGEST" != "$CACHED" ] && echo true || echo false)" \
            >> $GITHUB_OUTPUT
          echo "$DIGEST" > .base-digest

      # Persist the updated digest so the next scheduled run can compare against it.
      - name: Save base-digest cache
        if: github.event_name == 'schedule' && steps.check.outputs.changed == 'true'
        uses: actions/cache/save@v4
        with:
          path: .base-digest
          key: base-digest-${{ env.FEDORA_VERSION }}

      # Restore buildah layer cache from previous runs.
      # On cache hit, buildah skips re-downloading unchanged layers.
      - name: Restore buildah cache
        if: github.event_name != 'schedule' || steps.check.outputs.changed == 'true'
        uses: actions/cache/restore@v4
        with:
          path: /var/lib/containers/storage
          key: buildah-varos-${{ env.FEDORA_VERSION }}-${{ github.run_id }}
          restore-keys: |
            buildah-varos-${{ env.FEDORA_VERSION }}-

      - name: Get current date
        id: date
        if: github.event_name != 'schedule' || steps.check.outputs.changed == 'true'
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        if: github.event_name != 'schedule' || steps.check.outputs.changed == 'true'
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        id: metadata
        with:
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-labels: "\n"

      - name: Build Image
        id: build_image
        if: github.event_name != 'schedule' || steps.check.outputs.changed == 'true'
        env:
          LABELS: ${{ steps.metadata.outputs.labels }}
        run: |
          echo "$LABELS" > /tmp/image-labels.txt

          LABEL_ARGS=()
          while IFS= read -r label; do
            [ -z "$label" ] && continue
            LABEL_ARGS+=(--label "$label")
          done < /tmp/image-labels.txt

          sudo -E buildah build \
            "${LABEL_ARGS[@]}" \
            --tag raw-img \
            .

      - name: Run Rechunker
        id: rechunk
        if: github.event_name != 'schedule' || steps.check.outputs.changed == 'true'
        run: |
          container=$(sudo buildah from raw-img)
          mnt=$(sudo buildah mount $container)
          sudo bash -c "rm -rf $mnt/run/.* $mnt/run/* $mnt/tmp/.* $mnt/tmp/*"
          sudo buildah umount $container
          sudo buildah commit --identity-label=false --rm $container raw-img

          sudo podman run --rm --privileged \
            --volume /var/lib/containers:/var/lib/containers \
            --volume /var/tmp:/var/tmp \
            localhost/raw-img \
            rpm-ostree compose build-chunked-oci \
              --bootc \
              --max-layers 127 \
              --format-version 2 \
              --from localhost/raw-img \
              --output containers-storage:localhost/chunked-img

          sudo podman untag raw-img
          echo "ref=containers-storage:localhost/chunked-img" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name != 'schedule' || steps.check.outputs.changed == 'true')
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | \
            sudo skopeo login ghcr.io -u ${{ github.actor }} --password-stdin
          echo ${{ secrets.GITHUB_TOKEN }} | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push to GHCR
        id: push
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name != 'schedule' || steps.check.outputs.changed == 'true')
        env:
          IMAGE_REF: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}
          RECHUNK_REF: ${{ steps.rechunk.outputs.ref }}
        run: |
          EXTRA_TAGS=()
          for tag in ${{ steps.metadata.outputs.tags }}; do
            [ "$tag" = "${{ env.DEFAULT_TAG }}" ] && continue
            EXTRA_TAGS+=(--additional-tag "${IMAGE_REF}:${tag}")
          done

          sudo skopeo copy \
            "${EXTRA_TAGS[@]}" \
            ${RECHUNK_REF} \
            docker://${IMAGE_REF}:${{ env.DEFAULT_TAG }}

          DIGEST=$(sudo skopeo inspect --format '{{.Digest}}' \
            docker://${IMAGE_REF}:${{ env.DEFAULT_TAG }})
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT

      - name: Save buildah cache
        if: github.event_name != 'pull_request' && (github.event_name != 'schedule' || steps.check.outputs.changed == 'true')
        uses: actions/cache/save@v4
        with:
          path: /var/lib/containers/storage
          key: buildah-varos-${{ env.FEDORA_VERSION }}-${{ github.run_id }}

      - name: Install Cosign
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name != 'schedule' || steps.check.outputs.changed == 'true')
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0
        with:
          cosign-release: "v2.6.1"

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && (github.event_name != 'schedule' || steps.check.outputs.changed == 'true')
        run: |
          cosign sign -y --key env://COSIGN_PRIVATE_KEY \
            ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
