name: Build Disk Images

# When this workflow runs
on:
  workflow_dispatch:
  push:
    branches:
      - main

# Global environment variables
env:
  IMAGE_NAME: VarOS
  IMAGE_REGISTRY: ghcr.io/theskpaul
  DEFAULT_TAG: latest

  # Official bootc image builder container
  BIB_IMAGE: quay.io/centos-bootc/bootc-image-builder:latest

jobs:
  build-disk:
    name: Build disk images
    runs-on: ubuntu-24.04

    strategy:
      matrix:
        disk-type:
          - anaconda-iso

    steps:
      # ---------------------------------------------------
      # STEP 1 — Prepare variables
      # ---------------------------------------------------
      - name: Prepare environment
        shell: bash
        run: |
          USER_UID=$(id -u)
          USER_GID=$(id -g)

          # Convert disk type into safe string
          DISK_TYPE=$(echo "${{ matrix.disk-type }}" | tr ' ' '-')

          # GitHub container registry requires lowercase
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> $GITHUB_ENV
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

          echo "DISK_TYPE=${DISK_TYPE}" >> $GITHUB_ENV
          echo "USER_UID=${USER_UID}" >> $GITHUB_ENV
          echo "USER_GID=${USER_GID}" >> $GITHUB_ENV

      # ---------------------------------------------------
      # STEP 2 — Free disk space on GitHub runner
      # ---------------------------------------------------
      - name: Remove unnecessary packages
        uses: ublue-os/remove-unwanted-software@v1
        with:
          remove-codeql: true
          remove-dotnet: true
          remove-android: true
          remove-haskell: true
          remove-docker-images: true
          remove-large-packages: true
          remove-cached-tools: true
          use-sudo: true

      # ---------------------------------------------------
      # STEP 3 — Show available disk space
      # ---------------------------------------------------
      - name: Show disk space
        run: df -h

      # ---------------------------------------------------
      # STEP 4 — Download repository files
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # STEP 5 — Build ISO image
      # ---------------------------------------------------
      - name: Build ISO
        uses: osbuild/bootc-image-builder-action@main
        with:
          builder-image: ${{ env.BIB_IMAGE }}

          # Your TOML config file
          config-file: ./disk_config/iso.toml

          # Container image to convert into ISO
          image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.DEFAULT_TAG }}

          # Fix file ownership
          chown: ${{ env.USER_UID }}:${{ env.USER_GID }}

          # Build type
          types: ${{ env.DISK_TYPE }}

          additional-args: --use-librepo=True

      # ---------------------------------------------------
      # STEP 6 — Upload built ISO
      # ---------------------------------------------------
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.IMAGE_NAME }}-${{ env.DISK_TYPE }}
          path: output/
